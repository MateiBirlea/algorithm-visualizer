services:
  user-db:
    image: mysql:8.4
    container_name: user-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_service
    ports:
      - "3308:3306"
    volumes:
      - user-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-db:
    image: mysql:8.4
    container_name: auth-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: authentication_service
    ports:
      - "3307:3306"
    volumes:
      - auth-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  classroom-db:
    image: mysql:8.4
    container_name: classroom-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: classroom_service
    ports:
      - "3309:3306"
    volumes:
      - classroom-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    environment:
      SERVER_PORT: 8080
      DB_HOST: user-db
      DB_PORT: 3306
      DB_NAME: user_service
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      user-db:
        condition: service_healthy

  authentification-service:
    build:
      context: ./authentification-service
    container_name: authentification-service
    environment:
      SERVER_PORT: 8081
      DB_HOST: auth-db
      DB_PORT: 3306
      DB_NAME: authentication_service
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: VGhpc0lzQVNlY3VyZUFuZExvbmdFbm91Z2hKc3dUZXN0S2V5Rm9ySFM1NlNpZ25pbmcxMjM0NTY=
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8081:8081"
    depends_on:
      auth-db:
        condition: service_healthy

  algo-service:
    build:
      context: ./algo-service
    container_name: algo-service
    environment:
      SERVER_PORT: 8082
    ports:
      - "8082:8082"

  explanation-engine:
    build:
      context: ./explanation-engine
    container_name: explanation-engine
    environment:
      SERVER_PORT: 8083
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2
    ports:
      - "8083:8083"

  classroom-service:
    build:
      context: ./classroom-service
    container_name: classroom-service
    environment:
      SERVER_PORT: 8084
      DB_HOST: classroom-db
      DB_PORT: 3306
      DB_NAME: classroom_service
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: VGhpc0lzQVNlY3VyZUFuZExvbmdFbm91Z2hKc3dUZXN0S2V5Rm9ySFM1NlNpZ25pbmcxMjM0NTY=
      JWT_EXPIRATION_MS: 86400000
      EXPLANATION_ENGINE_URL: http://explanation-engine:8083
    ports:
      - "8084:8084"
    depends_on:
      classroom-db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_AUTH_API: http://localhost:8081
        REACT_APP_ALGO_API: http://localhost:8082
        REACT_APP_EXPLANATION_API: http://localhost:8083
        REACT_APP_CLASSROOM_API: http://localhost:8084
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      authentification-service:
        condition: service_started
      classroom-service:
        condition: service_started
      explanation-engine:
        condition: service_started

volumes:
  user-db-data:
  auth-db-data:
  classroom-db-data:
