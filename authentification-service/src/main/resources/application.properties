spring.application.name=authentification-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:authentication_service}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

security.jwt.secret-key=${JWT_SECRET:VGhpc0lzQVNlY3VyZUFuZExvbmdFbm91Z2hKc3dUZXN0S2V5Rm9ySFM1NlNpZ25pbmcxMjM0NTY=}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

server.error.include-message=always
